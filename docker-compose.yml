services:
  postgres:
    image: postgres:17-alpine
    container_name: laravel-shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: laravel_shop
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - laravel_shop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d laravel_shop"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  laravel_shop_pgdata:
